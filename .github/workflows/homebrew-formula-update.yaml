name: Update Homebrew Formula

# Computes SHA256 checksums of all platform binaries from the GitHub Release and
# updates the Homebrew formula in cdavis-code/homebrew-obs-websocket on every
# release publication.
#
# Prerequisites:
#   - The tap repo must exist: cdavis-code/homebrew-obs-websocket
#   - A GitHub PAT with repo scope must be stored as secret HOMEBREW_TAP_TOKEN
#     (must have write access to cdavis-code/homebrew-obs-websocket)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v5.7.0+1)'
        required: true
        type: string

jobs:
  update-formula:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    env:
      TAP_REPO: cdavis-code/homebrew-obs-websocket
      TAP_OWNER: cdavis-code
    steps:
      - name: Determine tag
        id: vars
        run: |
          # From workflow_dispatch input or release event
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          # Strip refs/tags/ prefix if present (from dispatch)
          TAG="${TAG#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Version without leading 'v' for the formula's version field
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Compute SHA256 ──────────────────────────────────────────────
      - name: Compute binary SHA256 checksums
        id: sha
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          BASE_URL="https://github.com/cdavis-code/obs_websocket_workspace/releases/download/${TAG}"

          # macOS ARM64
          URL="${BASE_URL}/obs-cli-darwin-arm64"
          echo "Fetching: $URL"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256_darwin_arm64=$SHA" >> "$GITHUB_OUTPUT"
          echo "  darwin-arm64 → $SHA"

          # macOS AMD64
          URL="${BASE_URL}/obs-cli-darwin-amd64"
          echo "Fetching: $URL"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256_darwin_amd64=$SHA" >> "$GITHUB_OUTPUT"
          echo "  darwin-amd64 → $SHA"

          # Linux ARM64
          URL="${BASE_URL}/obs-cli-linux-arm64"
          echo "Fetching: $URL"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256_linux_arm64=$SHA" >> "$GITHUB_OUTPUT"
          echo "  linux-arm64 → $SHA"

          # Linux AMD64
          URL="${BASE_URL}/obs-cli-linux-amd64"
          echo "Fetching: $URL"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256_linux_amd64=$SHA" >> "$GITHUB_OUTPUT"
          echo "  linux-amd64 → $SHA"

      # ── Update formula ──────────────────────────────────────────────
      - name: Clone Homebrew tap repo
        run: |
          git clone \
            "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ env.TAP_REPO }}.git" \
            tap-repo

      - name: Update formula content
        working-directory: tap-repo
        run: |
          FORMULA="Formula/obs-cli.rb"
          VERSION="${{ steps.vars.outputs.version }}"
          TAG="${{ steps.vars.outputs.tag }}"

          echo "Updating $FORMULA to version $VERSION"

          # Update version line
          sed -i "s/^  version \".*\"/  version \"$VERSION\"/" "$FORMULA"

          # Inject per-platform SHA256 placeholders
          sed -i "s/ARM64_MACOS_SHA256/${{ steps.sha.outputs.sha256_darwin_arm64 }}/" "$FORMULA"
          sed -i "s/AMD64_MACOS_SHA256/${{ steps.sha.outputs.sha256_darwin_amd64 }}/" "$FORMULA"
          sed -i "s/ARM64_LINUX_SHA256/${{ steps.sha.outputs.sha256_linux_arm64 }}/" "$FORMULA"
          sed -i "s/AMD64_LINUX_SHA256/${{ steps.sha.outputs.sha256_linux_amd64 }}/" "$FORMULA"

          # Show the updated formula for verification
          echo ""
          echo "--- Updated formula ($FORMULA) ---"
          cat "$FORMULA"

      - name: Commit and push formula
        working-directory: tap-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/obs-cli.rb
          git commit -m "obs-cli ${{ steps.vars.outputs.tag }}"
          git push origin main

      # ── Verify ──────────────────────────────────────────────────────
      - name: Validate formula syntax
        working-directory: tap-repo
        run: |
          if command -v brew &> /dev/null; then
            brew audit --strict Formula/obs-cli.rb || echo "::warning::brew audit found issues"
          else
            echo "::notice::Homebrew not available on this runner — skipping brew audit"
            # Basic Ruby syntax check as fallback
            ruby -c Formula/obs-cli.rb
          fi
