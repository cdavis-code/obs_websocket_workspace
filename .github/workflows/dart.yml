# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Dart

on:
  push:
    branches: [main]
    tags:
      - 'obs_websocket_js-v*'
      - 'obs_mcp_js-v*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pana:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/pana.yml@v1
    with:
      working_directory: packages/obs_websocket

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Note: This workflow uses the latest stable version of the Dart SDK.
      # You can specify other versions if desired, see documentation here:
      # https://github.com/dart-lang/setup-dart/blob/main/README.md
      - uses: dart-lang/setup-dart@v1

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Verify formatting
        run: melos run format-check

      - name: Analyze project source
        run: melos run analyze

      - name: Run tests
        run: melos run test

  obs_websocket_js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap Dart workspace
        run: melos bootstrap
      - name: Install npm deps
        working-directory: packages/obs_websocket_js
        run: npm install
      - name: Build (dart2js + tsup)
        working-directory: packages/obs_websocket_js
        run: npm run build
      - name: Type-check
        working-directory: packages/obs_websocket_js
        run: npm run typecheck
      - name: Test
        working-directory: packages/obs_websocket_js
        run: npm test

  obs_mcp_js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap Dart workspace
        run: melos bootstrap
      - name: Install npm deps
        working-directory: packages/obs_mcp_js
        run: npm install
      - name: Build (dart2js + tsup)
        working-directory: packages/obs_mcp_js
        run: npm run build
      - name: Type-check
        working-directory: packages/obs_mcp_js
        run: npm run typecheck
      - name: Test
        working-directory: packages/obs_mcp_js
        run: npm test

  publish-obs-websocket-js:
    needs: [obs_websocket_js]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/obs_websocket_js-v')
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap Dart workspace
        run: melos bootstrap
      - name: Install npm deps
        working-directory: packages/obs_websocket_js
        run: npm install
      - name: Build (dart2js + tsup)
        working-directory: packages/obs_websocket_js
        run: npm run build
      - name: Publish to npm
        working-directory: packages/obs_websocket_js
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-obs-mcp-js:
    needs: [obs_mcp_js]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/obs_mcp_js-v')
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap Dart workspace
        run: melos bootstrap
      - name: Install npm deps
        working-directory: packages/obs_mcp_js
        run: npm install
      - name: Build (dart2js + tsup)
        working-directory: packages/obs_mcp_js
        run: npm run build
      - name: Publish to npm
        working-directory: packages/obs_mcp_js
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
