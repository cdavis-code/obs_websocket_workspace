name: obs_websocket_workspace
publish_to: none

environment:
  sdk: ^3.8.0

workspace:
  - packages/obs_websocket
  - packages/obs_cli
  - packages/obs_mcp
  - packages/obs_websocket_js
  - packages/obs_mcp_js

dev_dependencies:
  melos: ^7.8.0

melos:
  name: obs_websocket_workspace
  packages:
    - packages/**
    - '!packages/**/example'

  command:
    bootstrap:
      runPubGetInParallel: false
      usePubspecOverrides: true

  scripts:
    lint:all:
      run: melos run analyze && melos run format-check
    dep:
      run: dart pub get
      exec:
        concurrency: 1
    build:
      run: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        fileExists: build.yaml
    analyze:
      run: dart analyze --fatal-infos
      exec:
        concurrency: 1
    format:
      run: dart format .
      exec:
        concurrency: 1
    format-check:
      run: dart format --output=none --set-exit-if-changed .
      packageFilters:
        dirExists: test
        ignore:
          - obs_websocket_js
          - obs_mcp_js
    test:
      run: melos run _test_internal --no-select
      exec:
        concurrency: 1
    dartdoc:
      run: dart doc
      packageFilters:
        scope: obs_websocket

    # The internal command that actually does the work
    _test_internal:
      exec: dart test
      packageFilters:
        dirExists: test
        ignore:
          - obs_websocket_js
          - obs_mcp_js