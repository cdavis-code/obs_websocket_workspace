name: obs_cli
version: 5.7.0+2
description: A CLI tool and MCP server for controlling OBS Studio via the obs-websocket protocol.
homepage: https://github.com/cdavis-code/obs_websocket_workspace
repository: https://github.com/cdavis-code/obs_websocket_workspace/tree/main/packages/obs_cli
issue_tracker: https://github.com/cdavis-code/obs_websocket_workspace/issues
documentation: https://pub.dev/documentation/obs_cli/latest/
funding:
  - https://buymeacoffee.com/cdavis
topics:
  - obs-websocket
  - obs-studio
  - streaming
  - broadcasting
  - cli

resolution: workspace

environment:
  sdk: ^3.8.0

executables:
  obs: obs

dependencies:
  obs_websocket: ^5.7.0+3
  args: ^2.7.0
  loggy: ^2.0.3
  universal_io: ^2.2.2
  uuid: ^4.5.1
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.1
  test: ^1.26.0
