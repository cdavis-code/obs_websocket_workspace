name: obs_websocket
version: 5.7.0+4
description: An OBS WebSocket client written in Dart. obs_websocket allows Dart-based connections to the OBS (Open Broadcaster Software) plugin obs-websocket.
homepage: https://github.com/cdavis-code/obs_websocket_workspace
repository: https://github.com/cdavis-code/obs_websocket_workspace/tree/main/packages/obs_websocket
issue_tracker: https://github.com/cdavis-code/obs_websocket_workspace/issues
documentation: https://pub.dev/documentation/obs_websocket/latest/
funding:
  - https://buymeacoffee.com/cdavis
topics:
  - obs-websocket
  - obs-studio
  - streaming
  - broadcasting
  - websocket

resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  crypto: ^3.0.6
  json_annotation: ^4.11.0
  loggy: ^2.0.3
  universal_io: ^2.2.2
  uuid: ^4.5.1
  validators: ^3.0.0
  web_socket_channel: ^3.0.2
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.10.1
  json_serializable: ^6.13.2
  lints: ^6.0.0
  test: ^1.25.14
